<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" width="100%" height="260">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    
    .card-bg { fill: #050508; }
    .border { stroke: #00f5ff; stroke-width: 1.5; fill: none; opacity: 0.8; }
    .border-purple { stroke: #a855f7; stroke-width: 1.5; fill: none; opacity: 0.8; }
    .grid-lines { stroke: rgba(0, 245, 255, 0.05); stroke-width: 0.5; }
    
    .title-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      font-weight: bold;
      fill: #00f5ff;
      letter-spacing: 2px;
      text-shadow: 0 0 6px rgba(0, 245, 255, 0.6);
    }
    .col-header {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      font-weight: bold;
      fill: #a855f7;
      letter-spacing: 1px;
    }
    .section-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10.5px;
      font-weight: bold;
      fill: #ffffff;
      letter-spacing: 0.5px;
    }
    .body-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9.5px;
      fill: #8c9099;
      letter-spacing: 0.2px;
    }
    .bullet-dot {
      fill: #00f5ff;
      animation: blink 2s infinite alternate;
    }
    @keyframes blink {
      0% { opacity: 0.3; }
      100% { opacity: 1; }
    }
  </style>

  <!-- Background and grid -->
  <rect width="800" height="260" class="card-bg" />
  
  <g class="grid-lines">
    <line x1="0" y1="40" x2="800" y2="40" />
    <line x1="0" y1="110" x2="800" y2="110" />
    <line x1="0" y1="180" x2="800" y2="180" />
    <line x1="400" y1="40" x2="400" y2="260" />
  </g>

  <!-- Outer frames -->
  <rect x="5" y="5" width="790" height="250" rx="6" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1" fill="none" />
  <path d="M 15 5 L 5 5 L 5 15" class="border" />
  <path d="M 785 5 L 795 5 L 795 15" class="border" />
  <path d="M 5 245 L 5 255 L 15 255" class="border" />
  <path d="M 795 245 L 795 255 L 785 255" class="border" />

  <!-- Card Title -->
  <g transform="translate(25, 27)">
    <text x="0" y="0" class="title-text">🌌 CORE MINDSET // TƯ DUY CỐT LÕI</text>
    <!-- pulsing active state -->
    <circle cx="340" cy="-5" r="3" fill="#00f5ff">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Left Column: English Version -->
  <g transform="translate(25, 55)">
    <text x="0" y="10" class="col-header">[ 🇺🇸 SYSTEM_LOG: EN ]</text>
    
    <!-- Item 1 -->
    <g transform="translate(0, 30)">
      <circle cx="5" cy="5" r="3" class="bullet-dot" />
      <text x="15" y="8" class="section-title">🥋 THE VOVINAM WAY</text>
      <text x="15" y="22" class="body-text">Mastery through focus and grit. Martial arts discipline</text>
      <text x="15" y="34" class="body-text">translates to resilience needed to solve complex bugs daily.</text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(0, 90)">
      <circle cx="5" cy="5" r="3" class="bullet-dot" />
      <text x="15" y="8" class="section-title">💡 "CƯƠNG NHU PHỐI TRIỂN" (IRON &amp; FLEXIBLE)</text>
      <text x="15" y="22" class="body-text">Building strong, secure backend architecture (Cương) that</text>
      <text x="15" y="34" class="body-text">remains highly scalable and adaptable to future changes (Nhu).</text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(0, 150)">
      <circle cx="5" cy="5" r="3" class="bullet-dot" />
      <text x="15" y="8" class="section-title">🌱 OPERATIONAL FOCUS</text>
      <text x="15" y="22" class="body-text">FPT University graduate ex-FPT Software backend intern.</text>
      <text x="15" y="34" class="body-text">Specializing in database performance and clean-code architectures.</text>
    </g>
  </g>

  <!-- Right Column: Vietnamese Version -->
  <g transform="translate(425, 55)">
    <text x="0" y="10" class="col-header">[ 🇻🇳 NHẬT_KÝ_HỆ_THỐNG: VI ]</text>
    
    <!-- Item 1 -->
    <g transform="translate(0, 30)">
      <circle cx="5" cy="5" r="3" class="bullet-dot" fill="#a855f7" />
      <text x="15" y="8" class="section-title">🥋 TINH THẦN VÕ ĐẠO</text>
      <text x="15" y="22" class="body-text">Thuần thục đến từ rèn luyện và tập trung cao độ. Rèn tính</text>
      <text x="15" y="34" class="body-text">kiên trì đương đầu với lỗi hệ thống phức tạp mỗi ngày.</text>
    </g>

    <!-- Item 2 -->
    <g transform="translate(0, 90)">
      <circle cx="5" cy="5" r="3" class="bullet-dot" fill="#a855f7" />
      <text x="15" y="8" class="section-title">💡 CƯƠNG NHU PHỐI TRIỂN</text>
      <text x="15" y="22" class="body-text">Thiết kế kiến trúc backend vững chắc, bảo mật (Cương)</text>
      <text x="15" y="34" class="body-text">nhưng vẫn linh hoạt, thích ứng tốt trước mọi thay đổi (Nhu).</text>
    </g>

    <!-- Item 3 -->
    <g transform="translate(0, 150)">
      <circle cx="5" cy="5" r="3" class="bullet-dot" fill="#a855f7" />
      <text x="15" y="8" class="section-title">🌱 LĨNH VỰC TẬP TRUNG</text>
      <text x="15" y="22" class="body-text">Tốt nghiệp ĐH FPT Cần Thơ, cựu thực tập sinh FPT Software.</text>
      <text x="15" y="34" class="body-text">Tập trung tối ưu cơ sở dữ liệu và xây dựng Clean Code.</text>
    </g>
  </g>
</svg>

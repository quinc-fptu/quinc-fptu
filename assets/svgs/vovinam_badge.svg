<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <style>
    .card {
      fill: #09090f;
      stroke: #00f5ff;
      stroke-width: 1.5;
      animation: glowCyan 4s infinite alternate;
    }
    .main-title {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 800;
      font-size: 15px;
      fill: #00f5ff;
      letter-spacing: 2px;
      text-shadow: 0 0 5px rgba(0, 245, 255, 0.5);
    }
    .subtitle {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 600;
      font-size: 12px;
      fill: #ffffff;
    }
    .desc {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 11px;
      fill: #8c9099;
    }
    .badge-icon {
      fill: url(#goldGradient);
      filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.4));
      animation: pulseMedal 2.5s infinite alternate;
    }
    @keyframes glowCyan {
      0% { filter: drop-shadow(0 2px 4px rgba(0, 245, 255, 0.1)); }
      100% { filter: drop-shadow(0 6px 15px rgba(0, 245, 255, 0.25)); }
    }
    @keyframes pulseMedal {
      0% { filter: drop-shadow(0 0 4px rgba(255, 215, 0, 0.4)); }
      100% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.7)); }
    }
  </style>
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe259" />
      <stop offset="100%" stop-color="#ffa751" />
    </linearGradient>
  </defs>
  
  <rect width="398" height="118" x="1" y="1" rx="8" class="card" />
  
  <!-- Medal Icon (Golden star & ribbon path with animated elements) -->
  <g transform="translate(15, 25)">
    <!-- Rotating Aura Ring -->
    <circle cx="25" cy="35" r="23" fill="none" stroke="rgba(255, 215, 0, 0.2)" stroke-width="1" stroke-dasharray="3, 3">
      <animateTransform attributeName="transform" type="rotate" from="0 25 35" to="360 25 35" dur="15s" repeatCount="indefinite" />
    </circle>
    <!-- Star Ribbon -->
    <path d="M 22 5 L 12 32 L 32 32 Z" fill="#ff4b4b" opacity="0.85" />
    <path d="M 28 5 L 18 32 L 38 32 Z" fill="#4b7eff" opacity="0.85" />
    <!-- Golden Gear Crest Border rotating counter-clockwise -->
    <circle cx="25" cy="35" r="18" fill="none" stroke="url(#goldGradient)" stroke-width="2" stroke-dasharray="6, 3">
      <animateTransform attributeName="transform" type="rotate" from="360 25 35" to="0 25 35" dur="8s" repeatCount="indefinite" />
    </circle>
    <!-- Medal Circle -->
    <circle cx="25" cy="35" r="14" class="badge-icon" />
    <!-- Star in Center -->
    <path d="M 25 26 L 28 31 L 33 32 L 29 36 L 30 41 L 25 38 L 20 41 L 21 36 L 17 32 L 22 31 Z" fill="#ffffff" />
  </g>

  <!-- Text Details -->
  <text x="80" y="40" class="main-title">🥇 VOVINAM ATHLETE</text>
  <text x="80" y="62" class="subtitle">City-Level Medal Winner</text>
  <text x="80" y="82" class="desc">Martial arts discipline meets modern developer mindset.</text>
  <text x="80" y="96" class="desc">Resilience in debug, consistency in code execution.</text>
</svg>

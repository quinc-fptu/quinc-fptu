<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 70" width="240" height="70">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    .card {
      fill: #09090f;
      stroke: #00f5ff;
      stroke-width: 1.5;
      animation: glowCyan 3s infinite alternate;
    }
    .lbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      font-weight: bold;
      fill: #00f5ff;
      letter-spacing: 1px;
    }
    .val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      fill: #ffffff;
    }
    .icon {
      fill: none;
      stroke: #00f5ff;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes glowCyan {
      0% { filter: drop-shadow(0 2px 4px rgba(0, 245, 255, 0.15)); }
      100% { filter: drop-shadow(0 4px 10px rgba(0, 245, 255, 0.35)); }
    }
  </style>
  <rect x="1" y="1" width="238" height="68" rx="6" class="card" />
  <!-- Envelope Icon -->
  <g transform="translate(18, 26)">
    <rect x="0" y="0" width="22" height="16" rx="2" class="icon" />
    <path d="M 0 2 L 11 9 L 22 2" class="icon" />
  </g>
  <text x="50" y="28" class="lbl">SYS.EMAIL_ROUTE</text>
  <text x="50" y="44" class="val">quinc.ce190986@gmail.com</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 70" width="240" height="70">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    .card {
      fill: #09090f;
      stroke: #f43f5e;
      stroke-width: 1.5;
      animation: glowRose 3s infinite alternate;
    }
    .lbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      font-weight: bold;
      fill: #f43f5e;
      letter-spacing: 1px;
    }
    .val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      fill: #ffffff;
    }
    .icon {
      fill: none;
      stroke: #f43f5e;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes glowRose {
      0% { filter: drop-shadow(0 2px 4px rgba(244, 63, 94, 0.15)); }
      100% { filter: drop-shadow(0 4px 10px rgba(244, 63, 94, 0.35)); }
    }
  </style>
  <rect x="1" y="1" width="238" height="68" rx="6" class="card" />
  <!-- GitLab custom branch icon -->
  <g transform="translate(20, 25)">
    <circle cx="5" cy="5" r="2.5" class="icon" />
    <circle cx="5" cy="15" r="2.5" class="icon" />
    <circle cx="15" cy="15" r="2.5" class="icon" />
    <line x1="5" y1="7.5" x2="5" y2="12.5" class="icon" />
    <path d="M 5 5 C 10 5, 15 10, 15 12.5" class="icon" />
  </g>
  <text x="50" y="28" class="lbl">SYS.GITLAB_REPO</text>
  <text x="50" y="44" class="val">gitlab.com/quinc.ce190986</text>
</svg>

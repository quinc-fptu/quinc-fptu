<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 70" width="240" height="70">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    .card {
      fill: #09090f;
      stroke: #a855f7;
      stroke-width: 1.5;
      animation: glowPurple 3s infinite alternate;
    }
    .lbl {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      font-weight: bold;
      fill: #a855f7;
      letter-spacing: 1px;
    }
    .val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      fill: #ffffff;
    }
    .icon {
      fill: none;
      stroke: #a855f7;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    @keyframes glowPurple {
      0% { filter: drop-shadow(0 2px 4px rgba(168, 85, 247, 0.15)); }
      100% { filter: drop-shadow(0 4px 10px rgba(168, 85, 247, 0.35)); }
    }
  </style>
  <rect x="1" y="1" width="238" height="68" rx="6" class="card" />
  <!-- LinkedIn custom logo representation -->
  <g transform="translate(18, 25)">
    <rect x="0" y="0" width="20" height="20" rx="3" class="icon" />
    <line x1="5" y1="9" x2="5" y2="15" class="icon" stroke-width="2" />
    <circle cx="5" cy="5" r="1.5" fill="#a855f7" />
    <path d="M 10 15 L 10 9 C 10 9, 11 7.5, 13 7.5 C 15 7.5, 15 9, 15 9 L 15 15" class="icon" stroke-width="1.8" />
  </g>
  <text x="50" y="28" class="lbl">SYS.LINKEDIN_PORT</text>
  <text x="50" y="44" class="val">linkedin.com/in/nguyen-cao-qui</text>
</svg>

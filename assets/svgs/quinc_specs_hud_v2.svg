<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%" height="180">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    
    .hud-bg { fill: #050508; }
    .grid-lines { stroke: rgba(0, 245, 255, 0.08); stroke-width: 0.5; }
    .radar-sweep {
      stroke: #00f5ff;
      stroke-width: 1.5;
      opacity: 0.8;
      transform-origin: 90px 90px;
      animation: sweep 4s linear infinite;
    }
    .radar-ring-ccw {
      stroke: #a855f7;
      stroke-width: 1;
      stroke-dasharray: 4, 6;
      opacity: 0.5;
      transform-origin: 90px 90px;
      animation: sweep-reverse 8s linear infinite;
    }
    .neon-text-blue {
      font-family: 'Share Tech Mono', Consolas, Monaco, monospace;
      font-size: 11.5px;
      fill: #00f5ff;
      text-shadow: 0 0 5px rgba(0, 245, 255, 0.8);
      letter-spacing: 0.5px;
    }
    .neon-text-purple {
      font-family: 'Share Tech Mono', Consolas, Monaco, monospace;
      font-size: 11.5px;
      fill: #a855f7;
      text-shadow: 0 0 5px rgba(168, 85, 247, 0.8);
      letter-spacing: 0.5px;
    }
    .glitch-text {
      animation: glitch 3s infinite;
    }
    .bar-fill {
      fill: #00f5ff;
      animation: fillBar 3s infinite alternate ease-in-out;
    }
    .bar-fill-purple {
      fill: #a855f7;
      animation: fillBar 4s infinite alternate ease-in-out;
    }
    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes sweep-reverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes fillBar {
      0% { width: 10px; }
      100% { width: 220px; }
    }
    @keyframes glitch {
      0%, 95%, 100% { opacity: 1; transform: skew(0); }
      96% { opacity: 0.8; transform: skew(-2deg); fill: #00f5ff; }
      97% { opacity: 0.9; transform: skew(3deg); fill: #a855f7; }
      98% { opacity: 0.7; transform: skew(-1deg); }
      99% { opacity: 0.9; transform: skew(1deg); }
    }
    .bracket { stroke: #00f5ff; stroke-width: 1.5; fill: none; }
    .bracket-purple { stroke: #a855f7; stroke-width: 1.5; fill: none; }
    .scanline {
      stroke: rgba(0, 245, 255, 0.04);
      stroke-width: 1.5;
      animation: scan 6s linear infinite;
    }
    @keyframes scan {
      0% { y1: 0; y2: 0; }
      100% { y1: 180; y2: 180; }
    }
  </style>

  <!-- HUD Main Box -->
  <rect width="800" height="180" class="hud-bg" />

  <!-- Scanline effect -->
  <line x1="0" y1="0" x2="800" y2="0" class="scanline" />

  <!-- Background Grid -->
  <g class="grid-lines">
    <line x1="0" y1="35" x2="800" y2="35" />
    <line x1="0" y1="70" x2="800" y2="70" />
    <line x1="0" y1="105" x2="800" y2="105" />
    <line x1="0" y1="140" x2="800" y2="140" />
    <line x1="180" y1="0" x2="180" y2="180" />
    <line x1="490" y1="0" x2="490" y2="180" />
  </g>

  <!-- Left Section: Radar & Telemetry -->
  <g transform="translate(0, 0)">
    <!-- Concentric radar circles -->
    <circle cx="90" cy="90" r="65" fill="none" stroke="rgba(0, 245, 255, 0.25)" stroke-width="1.5" />
    <circle cx="90" cy="90" r="50" class="radar-ring-ccw" />
    <circle cx="90" cy="90" r="35" fill="none" stroke="rgba(0, 245, 255, 0.15)" stroke-width="1" />
    <circle cx="90" cy="90" r="20" fill="none" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1" stroke-dasharray="2, 2" />
    
    <!-- Crosshairs -->
    <line x1="90" y1="15" x2="90" y2="165" stroke="rgba(0, 245, 255, 0.2)" stroke-width="0.5" />
    <line x1="15" y1="90" x2="165" y2="90" stroke="rgba(0, 245, 255, 0.2)" stroke-width="0.5" />
    
    <!-- Radar Sweep -->
    <line x1="90" y1="90" x2="90" y2="25" class="radar-sweep" />
    
    <!-- Glowing radar target dots -->
    <circle cx="130" cy="65" r="3.5" fill="#a855f7">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.8s" repeatCount="indefinite" />
    </circle>
    <circle cx="55" cy="115" r="2.5" fill="#00f5ff">
      <animate attributeName="opacity" values="0.1;1;0.1" dur="2.5s" repeatCount="indefinite" />
    </circle>
    
    <!-- Coordinates/Telemetry Overlay (FPT Univ Can Tho Coordinates!) -->
    <text x="15" y="170" class="neon-text-blue" font-size="8px" opacity="0.6">LOC: 10.027°N, 105.748°E</text>
    <text x="135" y="20" class="neon-text-purple" font-size="8px" opacity="0.6" text-anchor="end">SYS_SCAN_OK</text>
  </g>

  <!-- Center Section: Core Bio Specs -->
  <g transform="translate(195, 20)">
    <!-- Tech brackets (Modern split cyber bracket design) -->
    <path d="M 12 5 L -2 5 L -2 135 L 12 135" class="bracket" />
    <path d="M -2 40 L -2 100" class="bracket" stroke-width="2.5" />
    <path d="M 273 5 L 287 5 L 287 135 L 273 135" class="bracket-purple" />
    <path d="M 287 40 L 287 100" class="bracket-purple" stroke-width="2.5" />

    <!-- Info fields with little status icons / prefixes -->
    <text x="12" y="25" class="neon-text-blue glitch-text">&gt; SYSTEM: QUI.CORE_v7.2</text>
    <text x="12" y="45" class="neon-text-blue">&gt; ROLE: FULLSTACK DEVELOPER</text>
    <text x="12" y="65" class="neon-text-blue">&gt; STACK: .NET // REACT // NEXT.JS</text>
    <text x="12" y="85" class="neon-text-purple">&gt; PHILOSOPHY: VIBE_CODE</text>
    <text x="12" y="105" class="neon-text-purple">&gt; DISCIPLINE: VOVINAM</text>
    <text x="12" y="125" class="neon-text-purple">&gt; STATUS: ACTIVE // OVERCLOCKED</text>
    
    <!-- Small sub-markers -->
    <line x1="12" y1="135" x2="273" y2="135" stroke="rgba(168, 85, 247, 0.2)" stroke-width="1" stroke-dasharray="3, 5" />
  </g>

  <!-- Right Section: Graphic Visualizer & Stats Matrix -->
  <g transform="translate(505, 20)">
    <text x="10" y="20" class="neon-text-blue" font-weight="bold" letter-spacing="1px">INTELLIGENCE MATRIX</text>
    <circle cx="210" cy="16" r="3" fill="#00f5ff">
      <animate attributeName="fill" values="#00f5ff;#a855f7;#00f5ff" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Progress Bar 1 (Logic Matrix) -->
    <g transform="translate(0, 30)">
      <text x="10" y="15" class="neon-text-blue" font-size="10.5px">LOGIC_MATRIX</text>
      <!-- Segmented Bar Background -->
      <g opacity="0.25">
        <rect x="10" y="22" width="220" height="8" rx="2" fill="#00f5ff" />
      </g>
      <!-- Animating Segmented Fill -->
      <rect x="10" y="22" width="180" height="8" rx="2" class="bar-fill" />
      <!-- Segment grid overlay to make it look blocky/futuristic -->
      <line x1="30" y1="22" x2="30" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="50" y1="22" x2="50" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="70" y1="22" x2="70" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="90" y1="22" x2="90" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="110" y1="22" x2="110" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="130" y1="22" x2="130" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="150" y1="22" x2="150" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="170" y1="22" x2="170" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="190" y1="22" x2="190" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="210" y1="22" x2="210" y2="30" stroke="#050508" stroke-width="1.5" />
    </g>

    <!-- Progress Bar 2 (Aesthetics Matrix) -->
    <g transform="translate(0, 65)">
      <text x="10" y="15" class="neon-text-purple" font-size="10.5px">AESTHETICS</text>
      <!-- Segmented Bar Background -->
      <g opacity="0.25">
        <rect x="10" y="22" width="220" height="8" rx="2" fill="#a855f7" />
      </g>
      <!-- Animating Segmented Fill -->
      <rect x="10" y="22" width="165" height="8" rx="2" class="bar-fill-purple" />
      <!-- Segment grid overlay -->
      <line x1="30" y1="22" x2="30" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="50" y1="22" x2="50" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="70" y1="22" x2="70" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="90" y1="22" x2="90" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="110" y1="22" x2="110" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="130" y1="22" x2="130" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="150" y1="22" x2="150" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="170" y1="22" x2="170" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="190" y1="22" x2="190" y2="30" stroke="#050508" stroke-width="1.5" />
      <line x1="210" y1="22" x2="210" y2="30" stroke="#050508" stroke-width="1.5" />
    </g>

    <!-- Status Code Indicators -->
    <g transform="translate(10, 120)">
      <!-- Card 1 -->
      <g transform="translate(0, 0)">
        <rect width="105" height="25" rx="4" fill="rgba(0, 245, 255, 0.08)" stroke="#00f5ff" stroke-width="1" />
        <text x="52.5" y="16.5" text-anchor="middle" class="neon-text-blue" font-size="10px" font-weight="bold">VIBE: OVERCLOCK</text>
        <circle cx="8" cy="12.5" r="1.5" fill="#00f5ff" />
      </g>
      <!-- Card 2 -->
      <g transform="translate(115, 0)">
        <rect width="105" height="25" rx="4" fill="rgba(168, 85, 247, 0.08)" stroke="#a855f7" stroke-width="1" />
        <text x="52.5" y="16.5" text-anchor="middle" class="neon-text-purple" font-size="10px" font-weight="bold">TARGET: ELITE</text>
        <circle cx="8.5" cy="12.5" r="1.5" fill="#a855f7" />
      </g>
    </g>
  </g>
</svg>

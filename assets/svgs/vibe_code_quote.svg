<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <style>
    .card {
      fill: #09090f;
      stroke: #a855f7;
      stroke-width: 1.5;
      animation: glowPurple 4s infinite alternate;
    }
    .main-title {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 800;
      font-size: 15px;
      fill: #a855f7;
      letter-spacing: 2px;
      text-shadow: 0 0 5px rgba(168, 85, 247, 0.5);
    }
    .subtitle {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-weight: 600;
      font-size: 12px;
      fill: #ffffff;
    }
    .desc {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-size: 11px;
      fill: #8c9099;
    }
    .terminal-cursor {
      stroke: #00f5ff;
      stroke-width: 2;
      animation: blink 0.8s step-end infinite;
    }
    @keyframes glowPurple {
      0% { filter: drop-shadow(0 2px 4px rgba(168, 85, 247, 0.1)); }
      100% { filter: drop-shadow(0 6px 15px rgba(168, 85, 247, 0.25)); }
    }
    @keyframes blink {
      from, to { stroke: transparent }
      50% { stroke: #00f5ff; }
    }
  </style>
  
  <rect width="398" height="118" x="1" y="1" rx="8" class="card" />
  
  <!-- Cyberpunk Vibe Icon (Abstract rotating & pulsing digital core) -->
  <g transform="translate(45, 55)">
    <!-- Rotating outer ring -->
    <circle cx="0" cy="0" r="22" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="8, 6">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="10s" repeatCount="indefinite" />
    </circle>
    <!-- Inner pulsing diamond -->
    <polygon points="0,-11 9,0 0,11 -9,0" fill="none" stroke="#00f5ff" stroke-width="2">
      <animateTransform attributeName="transform" type="scale" values="1;1.25;1" dur="2.5s" repeatCount="indefinite" />
    </polygon>
    <!-- Core dot -->
    <circle cx="0" cy="0" r="3" fill="#a855f7">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Text Details -->
  <text x="80" y="40" class="main-title">💡 VIBE CODE PHILOSOPHY</text>
  <text x="80" y="62" class="subtitle">Craftsmanship &amp; AI Agility</text>
  <text x="80" y="82" class="desc">Code is a craft: clean logic, high readability.</text>
  <text x="80" y="96" class="desc">Leveraging AI to focus on high-level architecture.</text>
</svg>

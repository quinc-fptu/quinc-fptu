<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%" fill="none">
  <!-- Duong line thang va cac cham grid dot chuyen dong nhap nhay nhịp nhang bang animate tag -->
  <line x1="0" y1="10" x2="320" y2="10" stroke="#333333" stroke-width="1.2" />
  
  <!-- Dot 1 -->
  <circle cx="340" cy="10" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0s" repeatCount="indefinite" />
  </circle>
  
  <!-- Dot 2 -->
  <circle cx="360" cy="10" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.3s" repeatCount="indefinite" />
  </circle>
  
  <!-- Dot 3 -->
  <circle cx="380" cy="10" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.6s" repeatCount="indefinite" />
  </circle>
  
  <!-- Center Main Dot (Breath Animation) -->
  <circle cx="400" cy="10" r="2.5" fill="#ffffff" stroke="#000000" stroke-width="1">
    <animate attributeName="r" values="2;3.5;2" dur="2.5s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.6;1;0.6" dur="2.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Dot 4 -->
  <circle cx="420" cy="10" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="0.9s" repeatCount="indefinite" />
  </circle>
  
  <!-- Dot 5 -->
  <circle cx="440" cy="10" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1.2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Dot 6 -->
  <circle cx="460" cy="10" r="1.5" fill="#ffffff">
    <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" begin="1.5s" repeatCount="indefinite" />
  </circle>
  
  <line x1="480" y1="10" x2="800" y2="10" stroke="#333333" stroke-width="1.2" />
</svg>

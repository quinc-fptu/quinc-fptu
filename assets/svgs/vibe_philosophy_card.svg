<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 140" width="100%" height="140">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
    
    .card-bg { fill: #050508; }
    .border { stroke: #a855f7; stroke-width: 1.5; fill: none; opacity: 0.8; }
    .title-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      font-weight: bold;
      fill: #a855f7;
      letter-spacing: 2px;
      text-shadow: 0 0 6px rgba(168, 85, 247, 0.6);
    }
    .quote-mark {
      font-family: Georgia, serif;
      font-size: 40px;
      fill: rgba(0, 245, 255, 0.15);
      font-weight: bold;
    }
    .quote-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12.5px;
      font-weight: bold;
      fill: #00f5ff;
      letter-spacing: 0.5px;
      text-shadow: 0 0 4px rgba(0, 245, 255, 0.5);
    }
    .body-text {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      fill: #8c9099;
      letter-spacing: 0.3px;
    }
  </style>

  <!-- Background -->
  <rect width="800" height="140" class="card-bg" />

  <!-- Outer frames -->
  <rect x="5" y="5" width="790" height="130" rx="6" stroke="rgba(0, 245, 255, 0.15)" stroke-width="1" fill="none" />
  <path d="M 15 5 L 5 5 L 5 15" class="border" />
  <path d="M 785 5 L 795 5 L 795 15" class="border" />
  <path d="M 5 125 L 5 135 L 15 135" class="border" />
  <path d="M 795 125 L 795 135 L 785 135" class="border" />

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" class="title-text">🎨 MY PHILOSOPHY // TRIẾT LÝ HOẠT ĐỘNG</text>

  <!-- Quote marks background -->
  <text x="60" y="75" class="quote-mark">“</text>
  <text x="720" y="110" class="quote-mark">”</text>

  <!-- Quote text -->
  <text x="400" y="52" text-anchor="middle" class="quote-text">"Code is not just logic; it is a craft."</text>

  <!-- Body paragraphs -->
  <text x="400" y="78" text-anchor="middle" class="body-text">I believe code should have a soul. To me, a great software engineer writes clear, readable, and elegant</text>
  <text x="400" y="94" text-anchor="middle" class="body-text">stories that other developers can easily read and extend. Combining backend logic with modern AI workflows</text>
  <text x="400" y="110" text-anchor="middle" class="body-text">allows me to focus on high-level architecture, design aesthetics, and solving real human problems.</text>
</svg>

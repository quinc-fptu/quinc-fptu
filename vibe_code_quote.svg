<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 110" width="100%" height="110">
  <style>
    .glow-border {
      stroke: url(#cyanPurpleGradient);
      stroke-width: 1;
      fill: #08080c;
      filter: drop-shadow(0 0 2px rgba(168, 85, 247, 0.2));
    }
    .quote-text {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      font-style: italic;
      font-size: 15px;
      font-weight: 500;
      fill: #e2e8f0;
      text-shadow: 0 0 4px rgba(255, 255, 255, 0.2);
    }
    .author-text {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      font-weight: 800;
      fill: #00f5ff;
      letter-spacing: 1px;
      text-shadow: 0 0 3px rgba(0, 245, 255, 0.4);
    }
    .desc-text {
      font-family: 'Segoe UI', sans-serif;
      font-size: 11px;
      fill: #999999;
    }
    /* Animated frequency wave bar graph representing vibe/resonance */
    .bar {
      fill: url(#cyanPurpleGradient);
      animation: soundwave 1.5s infinite ease-in-out alternate;
    }
    .bar-1 { animation-delay: 0.1s; }
    .bar-2 { animation-delay: 0.4s; }
    .bar-3 { animation-delay: 0.2s; }
    .bar-4 { animation-delay: 0.6s; }
    .bar-5 { animation-delay: 0.3s; }
    .bar-6 { animation-delay: 0.7s; }
    .bar-7 { animation-delay: 0.5s; }
    
    @keyframes soundwave {
      0% { height: 4px; y: 86px; }
      100% { height: 28px; y: 62px; }
    }
  </style>
  <defs>
    <linearGradient id="cyanPurpleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff" />
      <stop offset="100%" stop-color="#a855f7" />
    </linearGradient>
  </defs>

  <!-- Base Card -->
  <rect x="5" y="5" width="790" height="100" rx="8" class="glow-border" />

  <!-- Quote Symbol Graphic -->
  <path d="M 30,35 C 30,25 38,20 45,20 L 45,28 C 40,28 37,32 37,36 L 45,36 L 45,48 L 30,48 Z M 52,35 C 52,25 60,20 67,20 L 67,28 C 62,28 59,32 59,36 L 67,36 L 67,48 L 52,48 Z" fill="#a855f7" filter="drop-shadow(0 0 2px #a855f7)" opacity="0.6"/>

  <!-- Quote Text -->
  <g transform="translate(85, 20)">
    <text x="0" y="20" class="quote-text">"Code is not just logic; it is a craft."</text>
    <text x="0" y="44" class="author-text">VIBE CODE PHILOSOPHY</text>
    <text x="0" y="62" class="desc-text">Writing clean, elegant backend architecture with an aesthetic soul.</text>
  </g>

  <!-- Right Side: Animated Resonance Waveform -->
  <g transform="translate(710, 0)">
    <rect x="0" y="70" width="3" height="20" class="bar bar-1" />
    <rect x="7" y="70" width="3" height="20" class="bar bar-2" />
    <rect x="14" y="70" width="3" height="20" class="bar bar-3" />
    <rect x="21" y="70" width="3" height="20" class="bar bar-4" />
    <rect x="28" y="70" width="3" height="20" class="bar bar-5" />
    <rect x="35" y="70" width="3" height="20" class="bar bar-6" />
    <rect x="42" y="70" width="3" height="20" class="bar bar-7" />
  </g>
</svg>

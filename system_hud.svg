<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="100%" height="180">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&amp;family=Share+Tech+Mono&amp;display=swap');
    
    .hud-bg {
      fill: #050508;
    }
    .grid-lines {
      stroke: rgba(0, 245, 255, 0.08);
      stroke-width: 0.5;
    }
    .radar-sweep {
      stroke: #00f5ff;
      stroke-width: 1.5;
      opacity: 0.8;
      transform-origin: 90px 90px;
      animation: sweep 4s linear infinite;
    }
    .neon-text-blue {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11.5px;
      fill: #00f5ff;
      text-shadow: 0 0 5px rgba(0, 245, 255, 0.8);
      letter-spacing: 0.5px;
    }
    .neon-text-purple {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11.5px;
      fill: #a855f7;
      text-shadow: 0 0 5px rgba(168, 85, 247, 0.8);
      letter-spacing: 0.5px;
    }
    .bar-fill {
      fill: #00f5ff;
      animation: fillBar 3s infinite alternate ease-in-out;
    }
    .bar-fill-purple {
      fill: #a855f7;
      animation: fillBar 4s infinite alternate ease-in-out;
    }
    @keyframes sweep {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes fillBar {
      0% { width: 10px; }
      100% { width: 220px; }
    }
    .bracket {
      stroke: #00f5ff;
      stroke-width: 1.5;
      fill: none;
    }
  </style>

  <!-- HUD Main Box (Borderless, Edge-to-Edge) -->
  <rect width="800" height="180" class="hud-bg" />

  <!-- Background Grid (Extended Edge-to-Edge) -->
  <g class="grid-lines">
    <line x1="0" y1="35" x2="800" y2="35" />
    <line x1="0" y1="70" x2="800" y2="70" />
    <line x1="0" y1="105" x2="800" y2="105" />
    <line x1="0" y1="140" x2="800" y2="140" />
    <line x1="180" y1="0" x2="180" y2="180" />
    <line x1="490" y1="0" x2="490" y2="180" />
  </g>

  <!-- Left Section: Radar Diagnostic -->
  <g transform="translate(0, 0)">
    <circle cx="90" cy="90" r="60" fill="none" stroke="rgba(0, 245, 255, 0.2)" stroke-width="1" />
    <circle cx="90" cy="90" r="40" fill="none" stroke="rgba(0, 245, 255, 0.15)" stroke-width="1" />
    <circle cx="90" cy="90" r="20" fill="none" stroke="rgba(0, 245, 255, 0.1)" stroke-width="1" />
    <!-- Crosshairs -->
    <line x1="90" y1="20" x2="90" y2="160" stroke="rgba(0, 245, 255, 0.15)" stroke-width="0.5" />
    <line x1="20" y1="90" x2="160" y2="90" stroke="rgba(0, 245, 255, 0.15)" stroke-width="0.5" />
    <!-- Sweeper Line -->
    <line x1="90" y1="90" x2="90" y2="30" class="radar-sweep" />
    <!-- Blip dot -->
    <circle cx="120" cy="70" r="3" fill="#a855f7">
      <animate attributeName="opacity" values="1;0;1" dur="2s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Center Section: Core Bio Specs -->
  <g transform="translate(195, 20)">
    <!-- Tech brackets (Widened to prevent text clipping) -->
    <path d="M 5 5 L -5 5 L -5 135 L 5 135" class="bracket" />
    <path d="M 280 5 L 290 5 L 290 135 L 280 135" class="bracket" />

    <text x="10" y="25" class="neon-text-blue">&gt; SYSTEM_ID: QUI.CORE_v7.2</text>
    <text x="10" y="45" class="neon-text-blue">&gt; CLASS: SOFTWARE_ENGINEER_ELITE</text>
    <text x="10" y="65" class="neon-text-blue">&gt; DOMAIN: BACKEND // ARCHITECTURE</text>
    <text x="10" y="85" class="neon-text-purple">&gt; CODE_PHILOSOPHY: VIBE_CODE_OVERCLOCK</text>
    <text x="10" y="105" class="neon-text-purple">&gt; DISCIPLINE: VOVINAM_MARTIAL_ARTS</text>
    <text x="10" y="125" class="neon-text-purple">&gt; HEALTH_STATUS: UNSTOPPABLE_100%</text>
  </g>

  <!-- Right Section: Graphic Visualizer -->
  <g transform="translate(505, 20)">
    <text x="10" y="20" class="neon-text-blue" font-weight="bold">INTELLIGENCE MATRIX</text>
    
    <!-- Progress Bar 1 (Logic) -->
    <text x="10" y="45" class="neon-text-blue" font-size="11px">LOGIC_MATRIX</text>
    <rect x="10" y="52" width="220" height="8" rx="2" fill="rgba(0, 245, 255, 0.15)" />
    <rect x="10" y="52" width="180" height="8" rx="2" class="bar-fill" />

    <!-- Progress Bar 2 (Aesthetics) -->
    <text x="10" y="80" class="neon-text-purple" font-size="11px">AESTHETICS</text>
    <rect x="10" y="87" width="220" height="8" rx="2" fill="rgba(168, 85, 247, 0.15)" />
    <rect x="10" y="87" width="160" height="8" rx="2" class="bar-fill-purple" />

    <!-- Status Code indicator -->
    <g transform="translate(10, 115)">
      <rect width="105" height="25" rx="4" fill="rgba(0, 245, 255, 0.1)" stroke="#00f5ff" stroke-width="1" />
      <text x="52" y="17" text-anchor="middle" class="neon-text-blue" font-size="11px" font-weight="bold">VIBE: OVERCLOCKED</text>
    </g>
    <g transform="translate(125, 115)">
      <rect width="105" height="25" rx="4" fill="rgba(168, 85, 247, 0.1)" stroke="#a855f7" stroke-width="1" />
      <text x="52" y="17" text-anchor="middle" class="neon-text-purple" font-size="11px" font-weight="bold">TARGET: ELITE</text>
    </g>
  </g>
</svg>
